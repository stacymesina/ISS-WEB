<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS Admin</title>

<link rel="stylesheet" href="css/site.css">
</head>

<body>

<header class="header">
  <div class="nav">
    <a href="index.html" class="logo">ISS NEXUS</a>
    <a href="index.html">View Site</a>
  </div>
</header>

<section class="section">
  <h1 class="title">ISS Admin</h1>
</section>

<!-- LOGIN -->
<div id="admin-login" class="admin-login">
  <h2>Admin Login</h2>

  <form id="login-form">

    <label>Password</label>

    <div style="display:flex;gap:10px;">
      <input type="password" id="admin-password" required>
      <button type="button" id="toggle-password" class="btn">Show</button>
    </div>

    <button class="btn" style="margin-top:12px;width:100%;">
      Login
    </button>

    <p id="login-error" style="color:red;margin-top:10px;"></p>
    <p id="login-attempts" style="opacity:0.7;margin-top:5px;"></p>

  </form>
</div>

<!-- DASHBOARD -->
<div id="admin-dashboard" class="admin-wrap" hidden>

  <h2>Dashboard</h2>

  <p>Admin panel loaded successfully.</p>

  <button id="logout-btn" class="btn">Logout</button>
</div>

<script src="js/site-config.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
